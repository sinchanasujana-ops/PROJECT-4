<!DOCTYPE html>
<html>
<head>
    <title>Add Dental Record</title>
</head>
<body>
    <h2>Add Dental Record</h2>

    <form method="post">
        Person ID: <input type="text" name="person_id" required><br><br>
        Third Molar Count: <input type="number" name="molar" required><br><br>
        Mandible Angle: <input type="number" step="0.1" name="angle" required><br><br>
        Filled Teeth Count: <input type="number" name="filled" required><br><br>

        <button type="submit">Save Record</button>
    </form>

    <br>
    <a href="/">Back to Home</a>
</body>
</html>
